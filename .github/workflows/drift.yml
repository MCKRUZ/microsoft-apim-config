# ============================================================================
# drift.yml — scheduled drift detection (Phase 2 pipelineGuardrails)
# ============================================================================
# Telemetry says nothing about whether someone hand-edited a policy in the portal.
# This does: nightly, it runs the repo template as a what-if against each live
# environment. Any mutating change means the live gateway no longer matches the
# reviewed source of truth — an out-of-band edit — and the job:
#   - fails (red signal in the Actions tab)
#   - opens/updates a tracking issue so the drift is owned, not silently re-applied
#
# Reconcile by redeploying the repo (overwrite the drift) or opening a PR to adopt
# the intended change. This is what makes "no portal edits in prod" enforceable.
# ============================================================================
name: drift-detection

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  issues: write           # to file a drift issue

jobs:
  drift:
    name: drift ${{ matrix.environment }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - environment: test
            profile: test
          - environment: prod
            profile: prod
    environment: ${{ matrix.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Detect drift
        id: drift
        env:
          AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
          GOV_PROFILE: ${{ matrix.profile }}
        # Exit 2 = drift, 0 = clean, 1 = error. Map 2 → a controlled "drift" output
        # so we can file an issue; let 1 fail the job hard.
        run: |
          set +e
          sh scripts/drift-detect.sh
          code=$?
          set -e
          if [ "$code" = "2" ]; then echo "drift=true" >> "$GITHUB_OUTPUT";
          elif [ "$code" = "0" ]; then echo "drift=false" >> "$GITHUB_OUTPUT";
          else echo "::error::drift check errored (code $code)"; exit 1; fi

      - name: File drift issue
        if: steps.drift.outputs.drift == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const env = '${{ matrix.environment }}';
            const title = `Infra drift detected in ${env}`;
            const body = [
              `The live \`${env}\` gateway no longer matches the repo (what-if found mutating changes).`,
              `This usually means a portal edit was made out-of-band.`,
              ``,
              `**Reconcile:** redeploy the repo to overwrite the drift, or open a PR to adopt the change.`,
              `See the [drift run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`,
            ].join('\n');
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'drift',
            });
            const hit = existing.data.find(i => i.title === title);
            if (hit) {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: hit.number, body });
            } else {
              await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, body, labels: ['drift'] });
            }

      - name: Fail the run on drift
        if: steps.drift.outputs.drift == 'true'
        run: exit 1
